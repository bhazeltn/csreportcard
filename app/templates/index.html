<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files</title>
</head>
<body>
    <h1>Upload Files</h1>
    <form method="post" action="{{ url_for('main.index') }}" enctype="multipart/form-data">
        <label for="evaluations_file">Select Evaluations Report:</label>
        <input type="file" id="evaluations_file" name="evaluations_file"><br><br>
        <label for="assessments_file">Select Assessments Report:</label>
        <input type="file" id="assessments_file" name="assessments_file"><br><br>
        <input type="submit" value="Upload">
    </form>
</body>
</html>
